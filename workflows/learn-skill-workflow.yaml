name: learn-skill-workflow
version: 2
objective: Create or improve a safe reusable skill with clear triggers and validation
version_control:
  local_tool: gitbutler
  setup_check: but status -fv
  setup_when_missing: but setup --status-after
  write_operations: use but instead of git write commands
steps:
  - id: scope
    action: capture_intent_trigger_output_and_boundaries
  - id: interview
    action: clarify_edge_cases_constraints_and_dependencies
  - id: draft
    action: draft_or_update_skill_file
  - id: validate
    action: check_safety_brevity_reusability_and_trigger_quality
  - id: test-plan
    action: propose_realistic_test_prompts_for_non_trivial_skills
  - id: save
    action: write_or_update_skill
  - id: learn
    action: persist_skill_trigger_notes
