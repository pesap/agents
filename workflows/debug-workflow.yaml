name: debug-workflow
version: 1
objective: Diagnose root cause and validate a reliable fix
version_control:
  local_tool: gitbutler
  setup_check: but status -fv
  setup_when_missing: but setup --status-after
  write_operations: use but instead of git write commands
steps:
  - id: intake
    action: restate_problem
  - id: evidence
    action: collect_reproduction_or_signals
  - id: hypotheses
    action: generate_ranked_hypotheses
  - id: hypothesis-analysis
    action: test_hypotheses_with_evidence
  - id: synthesis
    action: rank_findings_and_select_fix
  - id: apply
    action: implement_fix_when_requested
  - id: validate
    action: run_targeted_checks
  - id: learn
    action: persist_learnings
