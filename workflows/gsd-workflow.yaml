name: gsd-workflow
version: 1
objective: Execute an imported Get-Shit-Done workflow by name
steps:
  - id: resolve
    action: map_user_request_to_gsd_workflow
  - id: execute
    action: follow_selected_workflow_spec
  - id: report
    action: summarize_outcome_risks_next_steps
  - id: learn
    action: persist_learnings
