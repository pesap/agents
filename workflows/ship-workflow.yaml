name: ship-workflow
version: 1
objective: Simplify, verify, publish branch, and open PR/MR when missing
steps:
  - id: simplify
    action: simplify_current_uncommitted_scope
  - id: branch
    action: create_feature_branch_if_current_branch_is_main_or_master_and_no_branch_was_specified
  - id: validate
    action: run_project_ci_or_test_command
  - id: commit
    action: commit_verified_changes_when_needed
  - id: push
    action: push_current_branch_after_green_checks
  - id: pr-check
    action: detect_existing_pr_or_mr_for_current_branch
  - id: pr-open
    action: open_pr_or_mr_if_missing_using_template_targeting_main_unless_specified
  - id: summarize
    action: report_simplify_test_push_pr_status
  - id: learn
    action: persist_learnings
