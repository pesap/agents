name: ship-workflow
version: 1
objective: Simplify, verify, publish branch, and open PR/MR when missing
version_control:
  local_tool: gitbutler
  setup_check: but status -fv
  setup_when_missing: but setup --status-after
  write_operations: use but instead of git write commands
steps:
  - id: inspect-gitbutler
    action: inspect_gitbutler_state_and_list_applied_parallel_branches
  - id: select-target
    action: select_exactly_one_ship_target_branch_or_stack_and_ask_if_ambiguous
  - id: freshness-check
    action: verify_ship_target_has_unique_unmerged_work_and_is_not_already_on_default_branch
  - id: scope-check
    action: verify_requested_edits_exist_in_repo_local_diff_not_external_agent_paths
  - id: branch
    action: ensure_gitbutler_branch_or_stack_exists_for_ship_target
  - id: simplify
    action: simplify_current_uncommitted_scope_for_selected_ship_target
  - id: validate
    action: run_project_ci_or_test_command
  - id: signing-check
    action: verify_commit_will_be_signed_or_stop_for_user_assistance
  - id: commit
    action: commit_only_selected_change_ids_for_ship_target_when_needed
  - id: push
    action: push_ship_target_after_green_checks
  - id: pr-check
    action: detect_existing_pr_or_mr_for_ship_target
  - id: pr-open
    action: open_pr_or_mr_if_missing_using_template_targeting_default_or_specified_base
  - id: summarize
    action: report_simplify_test_push_pr_status
  - id: learn
    action: persist_learnings
